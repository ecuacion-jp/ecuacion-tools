name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. 1.0.0)'
        required: true

env:
  MAVEN_OPTS: -Xmx2g

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Checkout dependency repos in sibling directories to match local relativePath setup
      - name: Checkout ecuacion-lib
        uses: actions/checkout@v5
        with:
          repository: ecuacion-jp/ecuacion-lib
          path: ecuacion-lib

      - name: Checkout ecuacion-utils
        uses: actions/checkout@v5
        with:
          repository: ecuacion-jp/ecuacion-utils
          path: ecuacion-utils

      - name: Checkout ecuacion-splib
        uses: actions/checkout@v5
        with:
          repository: ecuacion-jp/ecuacion-splib
          path: ecuacion-splib

      - name: Checkout
        uses: actions/checkout@v5
        with:
          path: ecuacion-tools

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # Install dependencies in order (ecuacion-lib → ecuacion-utils → ecuacion-splib)
      - name: Install ecuacion-lib
        working-directory: ecuacion-lib
        run: mvn install -DskipTests -Dwagon.skip=true

      - name: Install ecuacion-utils
        working-directory: ecuacion-utils
        run: mvn install -DskipTests -Dwagon.skip=true

      - name: Install ecuacion-splib
        working-directory: ecuacion-splib
        run: mvn install -DskipTests -Dwagon.skip=true

      - name: Set version
        working-directory: ecuacion-tools
        run: mvn versions:set -DnewVersion=${{ steps.tag.outputs.value }} -DgenerateBackupPoms=false

      - name: Build
        working-directory: ecuacion-tools
        run: mvn package -DskipTests -Dwagon.skip=true -Dmaven.javadoc.skip=true -Dmaven.source.skip=true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            ecuacion-tools/ecuacion-tool-command-api/target/ecuacion-tool-command-api-*.war
            ecuacion-tools/ecuacion-tool-housekeep-db/target/ecuacion-tool-housekeep-db-*[0-9].jar
            ecuacion-tools/ecuacion-tool-housekeep-files/target/ecuacion-tool-housekeep-files-*[0-9].jar
          generate_release_notes: true
