name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

env:
  MAVEN_OPTS: -Xmx2g

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Checkout dependency repos in sibling directories to match local relativePath setup
      - name: Checkout ecuacion-lib
        uses: actions/checkout@v5
        with:
          repository: ecuacion-jp/ecuacion-lib
          path: ecuacion-lib

      - name: Checkout ecuacion-utils
        uses: actions/checkout@v5
        with:
          repository: ecuacion-jp/ecuacion-utils
          path: ecuacion-utils

      - name: Checkout ecuacion-splib
        uses: actions/checkout@v5
        with:
          repository: ecuacion-jp/ecuacion-splib
          path: ecuacion-splib

      - name: Checkout
        uses: actions/checkout@v5
        with:
          path: ecuacion-tools

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # Install dependencies in order (ecuacion-lib → ecuacion-utils → ecuacion-splib)
      - name: Install ecuacion-lib
        working-directory: ecuacion-lib
        run: mvn install -DskipTests -Dwagon.skip=true

      - name: Install ecuacion-utils
        working-directory: ecuacion-utils
        run: mvn install -DskipTests -Dwagon.skip=true

      - name: Install ecuacion-splib
        working-directory: ecuacion-splib
        run: mvn install -DskipTests -Dwagon.skip=true

      - name: Verify
        working-directory: ecuacion-tools
        run: mvn verify -Dwagon.skip=true

      - name: Upload coverage to Codecov
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main')
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            ecuacion-tools/ecuacion-tool-housekeep-db/target/site/jacoco/jacoco.xml,
            ecuacion-tools/ecuacion-tool-housekeep-files/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
